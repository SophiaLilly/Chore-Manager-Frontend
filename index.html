<!DOCTYPE html>
<html lang="en-GB">
    <head>
        <title>Get It Done</title>
        <link rel="icon" href="./favicon.ico">
        <link rel="apple-touch-icon" href="./apple-touch-icon.png">
    </head>
    <body>
        <h1>Chores</h1>
        <div id="status">Loading...</div>
        <div id="chores"></div>
        <script>
            async function loadUser() {

                const uuid = window.location.hash.substring(1);
                const statusDiv = document.getElementById("status");
                const choresDiv = document.getElementById("chores");

                if (!uuid) {
                    statusDiv.innerText =
                        "Missing user UUID in URL.";
                    return;
                }

                try {
                    const response = await fetch(
                        `https://api.lillywhite.dev/today?uuid=${uuid}`
                    );
                    const data = await response.json();

                    statusDiv.innerText =
                        "Hello " + data.user;
                    if (data.tasks.length === 0) {
                        choresDiv.innerText = "No chores for today!";
                    } else {
                        const ul = document.createElement("ul");
                        data.tasks.forEach(chore => {
                            const li = document.createElement("li");
                            li.innerText = chore;
                            ul.appendChild(li);
                        });
                        choresDiv.appendChild(ul);

                }
                catch (error) {
                    statusDiv.innerText =
                        "Error fetching user data.";
                    console.error(error);
                }






            }

            loadUser();
        </script>
    </body>
</html>
