<!DOCTYPE html>
<html lang="en-GB">
    <head>
        <title>Get It Done - Admin</title>

        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
        <meta http-equiv="Pragma" content="no-cache">
        <meta http-equiv="Expires" content="0">

        <link rel="stylesheet" href="css/shared.css">
        <link rel="stylesheet" href="css/admin.css">
    </head>

    <body>
        <div id="navbar">
            <div class="nav-left">Get It Done (Admin)</div>
            <div class="nav-right">
                <a href="#" id="homeLink">Home</a>
                <a href="#" id="adminLink">Admin</a>
            </div>
        </div>
        <div id="status">Loading...</div>

        <div class="section">
            <h2>Shared To-Do List</h2>
            <ul id="todoList"></ul>
            <div class="add-row">
                <label for="todoInput"></label><input id="todoInput" placeholder="New task..." />
                <button onclick="addTodo()">Add</button>
            </div>
        </div>

        <div class="section">
            <h2>Task Manager</h2>
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <select id="dayFilter">
                    <option value="">All Days</option>
                    <option value="0">Monday</option>
                    <option value="1">Tuesday</option>
                    <option value="2">Wednesday</option>
                    <option value="3">Thursday</option>
                    <option value="4">Friday</option>
                    <option value="5">Saturday</option>
                    <option value="6">Sunday</option>
                </select>
                <select id="sortMode">
                    <option value="name">Sort: Name</option>
                    <option value="difficulty">Sort: Difficulty</option>
                    <option value="interval">Sort: Frequency</option>
                </select>
            </div>

            <ul id="taskList"></ul>
            <div class="add-row">
                <input id="taskName" placeholder="Task name" />
                <input id="taskDifficulty" type="number" placeholder="Difficulty" />
                <input id="taskInterval" type="number" placeholder="Every X days" />
                <input id="taskDays" placeholder="Allowed days (e.g. 0,1,2)" />
                <button onclick="addTask()">Add</button>
            </div>
        </div>

        <script src="js/api.js"></script>
        <script src="js/shared.js"></script>
        <script src="js/ui.js"></script>
        <script src="js/admin.js"></script>
    </body>
</html>
